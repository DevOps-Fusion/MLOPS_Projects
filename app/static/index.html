<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DevOps Issue Assistant</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #1f4037, #99f2c8);
    margin: 0;
    padding: 0;
}

.container {
    max-width: 700px;
    margin: 80px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    color: #333;
}

input {
    width: 75%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 16px;
}

button {
    padding: 12px 20px;
    background: #1f4037;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #14532d;
}

.result {
    margin-top: 20px;
    background: #f4f4f4;
    padding: 15px;
    border-radius: 8px;
    white-space: pre-wrap;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
    <h2>🚀 DevOps Issue Assistant</h2>

    <div style="display:flex; gap:10px;">
        <input type="text" id="issue" placeholder="Enter issue (e.g. CrashLoopBackOff)">
        <button onclick="getResult()">Analyze</button>
    </div>

    <div id="result" class="result"></div>
</div>

<script>
async function getResult() {
    const issue = document.getElementById("issue").value;

    const response = await fetch(`/predict?issue=${issue}`);
    const data = await response.json();

    let output = `
Issue: ${data.predicted_issue}

Description:
${data.description}

Causes:
- ${data.causes.replace(/;/g, "\n- ")}

Debug Steps:
- ${data.debug.replace(/;/g, "\n- ")}

Solution:
- ${data.solution.replace(/;/g, "\n- ")}
    `;

    document.getElementById("result").innerText = output;
}
</script>

</body>
</html>
