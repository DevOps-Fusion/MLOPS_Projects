apiVersion: v1
kind: Pod
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  containers:
  - name: prometheus
    image: prom/prometheus:v2.48.0
    ports:
      - containerPort: 9090
    volumeMounts:
      - name: config
        mountPath: /etc/prometheus
    args:
      - "--config.file=/etc/prometheus/prometheus.yml"
  volumes:
    - name: config
      configMap:
        name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: monitoring
spec:
  selector:
    app: prometheus
  type: NodePort
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
      nodePort: 30900
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'ml-app'
        static_configs:
          - targets: ['devops-ml-service.default.svc.cluster.local:80']

